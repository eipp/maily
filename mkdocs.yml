site_name: Maily Documentation
site_description: Documentation for the Maily AI-Powered Email Campaign Platform
site_author: Maily Team
repo_url: https://github.com/yourusername/maily

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Quick Start: getting-started/quick-start.md
  - Features:
    - AI Integration: features/ai-integration.md
    - Campaign Management: features/campaign-management.md
    - Analytics: features/analytics.md
    - Monitoring: features/monitoring.md
  - API Reference:
    - Authentication: api/authentication.md
    - Endpoints: api/endpoints.md
    - Models: api/models.md
    - Error Handling: api/error-handling.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - Performance: development/performance.md
  - Operations:
    - Deployment: operations/deployment.md
    - Monitoring: operations/monitoring.md
    - Backup & Recovery: operations/backup-recovery.md
    - Security: operations/security.md

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/maily
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mailyapp

copyright: Copyright &copy; 2024 Maily Team 